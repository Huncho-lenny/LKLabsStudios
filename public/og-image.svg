<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b5de5"/>
      <stop offset="100%" stop-color="#3baeff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9b5de5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#3baeff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3baeff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="300" cy="280" rx="380" ry="320" fill="url(#glow1)"/>
  <ellipse cx="900" cy="400" rx="320" ry="280" fill="url(#glow2)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="16" stroke="url(#grad)" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#grad)"/>
  <text x="116" y="132" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">LK</text>

  <!-- Brand name -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">LKLabs Studios</text>

  <!-- Gradient underline -->
  <rect x="80" y="278" width="520" height="4" rx="2" fill="url(#grad)"/>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8" letter-spacing="1">Building Brands · Designing Experiences</text>

  <!-- Services pills -->
  <rect x="80" y="390" width="180" height="44" rx="22" fill="#9b5de5" fill-opacity="0.15" stroke="#9b5de5" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="418" font-family="Arial, sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">Web Dev</text>

  <rect x="276" y="390" width="180" height="44" rx="22" fill="#3baeff" fill-opacity="0.15" stroke="#3baeff" stroke-opacity="0.4" stroke-width="1"/>
  <text x="366" y="418" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">UI/UX Design</text>

  <rect x="472" y="390" width="180" height="44" rx="22" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-opacity="0.4" stroke-width="1"/>
  <text x="562" y="418" font-family="Arial, sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">Branding</text>

  <rect x="668" y="390" width="220" height="44" rx="22" fill="#9b5de5" fill-opacity="0.15" stroke="#9b5de5" stroke-opacity="0.4" stroke-width="1"/>
  <text x="778" y="418" font-family="Arial, sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">Social Media</text>

  <!-- URL -->
  <text x="80" y="530" font-family="monospace, sans-serif" font-size="20" fill="#475569" letter-spacing="1">lk-labs-studios.vercel.app</text>

  <!-- Decorative code tag -->
  <text x="1080" y="540" font-family="monospace, sans-serif" font-size="64" fill="white" fill-opacity="0.04" text-anchor="middle">&lt;/&gt;</text>
</svg>
